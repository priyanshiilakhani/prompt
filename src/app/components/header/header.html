<header id="navbar" class="@@link-color fixed top-0 inset-x-0 flex items-center z-40 w-full lg:bg-transparent bg-white transition-all py-5"
      [ngClass]="{
        'nav-sticky': isSticky,
        dark: isCustomClassActive('/blog')
      }"
      >
    <div class="container">
        <nav class="flex items-center">
            <!-- Navbar Brand Logo -->
            <a routerLink="/">
                <img src="assets/images/logo-dark.png" class="h-8 logo-dark" alt="Logo Dark">
                <img src="assets/images/logo-light.png" class="h-8 logo-light" alt="Logo Light">
            </a>

            <!-- Nevigation Menu -->
            <div class="hidden lg:block ms-auto">
                <app-navbar />
            </div>

            <!-- Download Button -->
            <div class="hidden lg:flex items-center ms-3">
                <a href="https://1.envato.market/prompt-tailwind" target="_blank" class="bg-primary text-white px-4 py-2 rounded inline-flex items-center text-sm">Download</a>
            </div>

            <!-- Moblie Menu Toggle Button (Offcanvas Button) -->
            <div class="lg:hidden flex items-center ms-auto px-2.5">
                <button type="button" class="py-3 px-4 inline-flex items-center" aria-haspopup="dialog" aria-expanded="false" aria-controls="mobileMenu" data-hs-overlay="#mobileMenu">
                    <iconify-icon icon="fa6-solid:bars" class="text-2xl text-default-500"></iconify-icon>
                </button>
            </div>
        </nav>
    </div>
</header>
<div id="mobileMenu" class="hs-overlay hs-overlay-open:translate-x-0 hidden -translate-x-full fixed top-0 start-0 transition-all duration-300 transform h-full max-w-xs w-full z-80 bg-white border-e border-e-default-200" role="dialog" tabindex="-1" aria-labelledby="mobileMenu-label">
    <div>
        <div class="flex flex-col h-full divide-y-2 divide-default-200">
            <!-- Mobile Menu Topbar Logo (Header) -->
            <div class="p-6 flex items-center justify-between">
                <a routerLink="/">
                    <img src="assets/images/logo-dark.png" class="h-8" alt="Logo">
                </a>

                <button type="button" class="size-8 inline-flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-gray-100 text-gray-800 hover:bg-gray-200 focus:outline-none focus:bg-gray-200 disabled:opacity-50 disabled:pointer-events-none" aria-label="Close" data-hs-overlay="#mobileMenu">
                    <span class="sr-only">Close</span>
                    <iconify-icon icon="fa6-solid:xmark" class="text-xl"></iconify-icon>
                </button>
            </div>

            <!-- Mobile Menu Link List -->
            <div class="p-6 overflow-scroll h-full">
               <app-mobile-nav />
            </div>

            <!-- Mobile Menu Download Button (Footer) -->
            <div class="p-6 flex items-center justify-center">
                <a href="https://1.envato.market/prompt-tailwind" target="_blank" class="bg-primary w-full text-white p-3 rounded flex items-center justify-center text-sm">Download</a>
            </div>
        </div>
    </div>
</div>
