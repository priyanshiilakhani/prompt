 <section class="bg-gradient-to-t from-default-500/10 relative">

        <section class="relative pt-44 pb-36">
            <div class="container">
                <div class="grid lg:grid-cols-2 grid-cols-1 gap-16 items-center">

                    <div class="order-2 lg:order-1">
                        <div class="text-center sm:text-start">

                            <h1 class="text-3xl/tight sm:text-4xl/tight lg:text-5xl/tight font-semibold mb-7">
                                The best way to
                                <span
                                    class="relative z-0 after:bg-green-500/50 after:-z-10 after:absolute md:after:h-6 after:h-4 after:w-full after:bottom-0 after:end-0">showcase</span>
                                your saas
                            </h1>
                            <p class="sm:text-lg text-default-500">Make your saas application stand out with
                                high-quality landing page designed and developed by professional</p>
                            <div class="flex gap-3 mt-16">
                                <input type="email"
                                    class="inline-block text-sm border border-default-300 focus:ring-0 rounded shadow-lg sm:shadow-none bg-white w-full py-3 "
                                    id="Email" aria-describedby="emailHelp" placeholder="Your Email">
                                <button for="Email"
                                    class="bg-primary text-white rounded-lg text-sm font-semibold flex-none hover:shadow-lg hover:shadow-primary/30 focus:shadow-none focus:outline focus:outline-primary/40 px-3">Sign
                                    Up</button>
                            </div>
                            <div class="flex flex-wrap items-center gap-5 mt-5">
                                <div class="flex items-center gap-2">
                                    <iconify-icon icon="tabler:check" width="20" height="20" class="text-green-500"></iconify-icon>
                                    <p class="text-sm text-default-700">Free 14-day Demo</p>
                                </div>
                                <div class="flex items-center gap-2">
                                    <iconify-icon icon="tabler:check" width="20" height="20" class="text-green-500"></iconify-icon>
                                    <p class="text-sm text-default-700">No credit card needed</p>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="order-1 lg:order-2">
                        <div class="relative">

                            <div class="hidden sm:block">
                                <div
                                    class="before:w-24 before:h-24 before:absolute before:-bottom-8 before:-start-8 before:bg-[url('assets/images/pattern/dot2.svg')]">
                                </div>
                                <div
                                    class="after:w-24 after:h-24 after:absolute after:-top-10 after:end-10 2xl:after:end-0 after:rotate-45 after:bg-[url('assets/images/pattern/dot5.svg')]">
                                </div>
                            </div>

                            <div id="swiper_one" class="swiper border-[6px] border-white bg-white 2xl:w-[140%]"
                                data-aos="fade-left" data-aos-duration="1000">
                                <swiper-container [config]="swiperConfig" init="false" class="swiper-wrapper">
                                    @for(item of sliderData;track $index){
                                    <swiper-slide>
                                        <div class="absolute inset-0 flex items-center justify-center">
                                            <a [routerLink]="[]"
                                                class="sm:h-14 h-10 sm:w-14 w-10 rounded-full bg-green-500 flex items-center justify-center">
                                                <iconify-icon icon="tabler:player-play-filled" width="20" height="20" class="text-white"></iconify-icon>
                                            </a>
                                        </div>
                                        <img [src]="item.image" [alt]="item.alt"
                                        class="w-full h-full rounded-md">
                                    </swiper-slide>
                                }
                                </swiper-container>
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </section>

        <div class="absolute bottom-0 inset-x-0 hidden sm:block">
            <img src="assets/images/shapes/white-wave.svg" alt="white-wave-svg"
                class="w-full -scale-x-100 -scale-y-100">
        </div>

    </section>
