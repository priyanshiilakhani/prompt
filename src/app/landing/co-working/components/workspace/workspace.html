<section class="py-20">
  <div class="container">
    <div class="text-center" data-aos="fade-up">
      <span class="text-sm font-medium py-1 px-3 rounded-full text-primary bg-primary/10"
        >Flexible</span
      >
      <h2 class="md:text-3xl text-xl font-semibold my-5">Coworking Space Options</h2>
    </div>

    <div class="grid xl:grid-cols-3 lg:grid-cols-2 grid-cols-1 gap-6 mt-16">
      @for (item of workData; track $index) {
        <div
          class="shadow-lg rounded"
          data-aos="fade-up"
          [attr.data-aos-duration]="item.aosDuration"
        >
          <img [src]="item.image" class="rounded-t" />

          <div class="p-5">
            <h4 class="text-lg font-medium text-primary mb-2">
              {{ item.title }}
            </h4>

            <p class="text-sm text-default-500">
              {{ item.description }}
            </p>
          </div>

          <div class="p-5 pt-0">
            <p class="flex items-center gap-3">
              <iconify-icon [icon]="item.icon" width="20" height="20"></iconify-icon>

              <a [routerLink]="[]" class="text-sm font-medium text-default-500">
                {{ item.linkText }}
              </a>
            </p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
