<section class="py-24 bg-default-500/10 relative" data-aos="fade-up">
    <div class="absolute top-0 inset-x-0 hidden sm:block">
        <img src="assets/images/shapes/white-wave.svg" alt="svg" class="w-full -scale-x-100">
    </div>
    <div class="container relative">
        <div class="text-center">
            <span class="text-sm font-medium py-1 px-3 rounded-full text-primary bg-primary/10">Why Choose Us</span>
            <h1 class="text-3xl font-medium my-3">The most trusted way to buy or sell crypto currency</h1>
            <p class="text-default-400 mt-5 mb-4">Here are the few reasons why you should choose us</p>
        </div>

        <div class="grid lg:grid-cols-2 grid-cols-1 gap-6 mt-14">
            @for (item of featureData; track $index) {
            <div class="flex items-center gap-5 bg-white p-5 rounded-md shadow-default-300">
                <div>
                    <div class="w-12 h-12 bg-primary/10 flex items-center justify-center rounded-md">
                        <iconify-icon [icon]="item.icon" height="28" width="28" class="text-primary"></iconify-icon>
                    </div>
                </div>
                <div>
                    <h5 class="text-base font-semibold">{{ item.title }}</h5>
                    <p class="text-default-600 mt-2">{{ item.description }}</p>
                </div>
            </div>
            }
        </div>
    </div>
</section>
