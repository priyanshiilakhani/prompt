<section class="py-20">
    <div class="container">
        <div class="text-center">
            <h1 class="text-3xl font-medium my-3">Useful Reading</h1>
            <p class="text-default-500 mt-5 mb-4">Few articles to read to know more about cryptocurrency</p>
        </div>

        <div class="grid lg:grid-cols-3 grid-cols-1 gap-5 mt-12">
            @for (item of blogData; track item.title) {
            <div>
                <div class="relative" data-aos="fade-up" [attr.data-aos-duration]="item.aosDuration">
                    <span class="absolute top-3 p-1 pe-6 text-sm font-semibold text-white" style="clip-path: polygon(0% 0%, 100% 0, 90% 49%, 100% 99%, 0% 100%);" [class]="item.className">{{ item.tag }}</span>
                    <img [src]="item.image" class="rounded-md">
                </div>
                <p class="text-default-500 mt-5">{{ item.date }} . {{ item.readTime }}</p>
                <h4 class="mt-1 text-lg">
                    <a [routerLink]="[]">{{ item.title }}</a>
                </h4>
            </div>
            }
        </div>
    </div>
</section>
