<section class="py-20">
  <div class="container">
    <div class="grid lg:grid-cols-2 gap-5">
      <div>
        <h1 class="text-3xl font-medium my-3">Latest Projects</h1>
      </div>

      <div class="flex flex-wrap items-center gap-8">
        <p><a [routerLink]="[]" class="font-medium text-blue-600">UI/UX Design</a></p>
        <p><a [routerLink]="[]" class="font-medium hover:text-blue-600">Branding</a></p>
        <p><a [routerLink]="[]" class="font-medium hover:text-blue-600">Marketing</a></p>
        <p><a [routerLink]="[]" class="font-medium hover:text-blue-600">Web Development</a></p>
      </div>
    </div>

    @for (group of projectCardData; track $index) {
      <div
        class="grid lg:grid-cols-2 grid-cols-1 gap-6"
        data-aos="fade-up"
        [attr.data-aos-duration]="group.aosDuration"
      >
        @for (item of group.items; track $index) {
          <div class="group relative mt-12 hover:opacity-80">
            <div
              class="pt-12 ps-12 bg-default-300/20 group-hover:bg-white/10 rounded-md group-hover:shadow-lg transition-all duration-300"
            >
              <div>
                <div class="flex items-center justify-between mb-7">
                  <h3 class="text-xl">{{ item.title }}</h3>
                  <p class="font-medium text-default-500 pe-8">
                    {{ item.category }}
                  </p>
                </div>

                <div>
                  <img [src]="item.image" class="rounded-md" />
                </div>

                <div
                  class="absolute inset-0 group-hover:flex items-center justify-center hidden transition-all duration-300 z-10"
                >
                  <a [routerLink]="[]" class="inline-block">
                    <div class="flex items-center gap-3 py-[6px] px-3 bg-red-500 rounded-md">
                      <p class="text-sm font-semibold text-white">View Project</p>
                      <iconify-icon icon="fa6-solid:arrow-right" class="text-white"></iconify-icon>
                    </div>
                  </a>
                </div>
              </div>
            </div>

            <div
              class="absolute inset-0 group-hover:bg-default-300/20 transition-all duration-300"
            ></div>
          </div>
        }
      </div>
    }
  </div>
</section>
