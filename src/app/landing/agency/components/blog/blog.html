<section class="py-20">
  <div class="container">
    <div class="text-center">
      <span class="text-sm font-medium py-1 px-3 rounded-full text-primary bg-primary/10"
        >Blog</span
      >
      <h1 class="text-3xl font-medium my-3">Interesting Articles</h1>
    </div>

    <div class="grid lg:grid-cols-3 sm:grid-cols-2 grid-cols-1 mt-12 gap-6">
      @for (item of blogData; track $index) {
        <div
          class="shadow-md rounded-md"
          data-aos="fade-up"
          [attr.data-aos-duration]="item.aosDuration"
        >
          <div class="relative">
            <div class="absolute end-4 top-3">
              <span
                class="px-3 py-1 text-sm font-medium text-white rounded-md"
                [class]="item.categoryBg + ' px-3 py-1 text-sm font-medium text-white rounded-md'"
              >
                {{ item.category }}
              </span>
            </div>

            <img [src]="item.image" />

            <div class="absolute -bottom-5">
              <svg
                class="w-full h-14 text-white"
                viewBox="0 0 528 40"
                version="1.1"
                xmlns:xlink="http://www.w3.org/1999/xlink"
                xmlns="http://www.w3.org/2000/svg"
              >
                <g id="shape" transform="matrix(-1.138336E-07 -1 1 -1.138336E-07 0 39.92764)">
                  <path
                    d="M0 0L40.5467 0C40.5467 0 -31.8215 230.87 38.7134 528.217C39.8794 533.133 31.7549 527.502 31.0925 528.75C28.7914 533.084 26.1543 528.191 24.4327 529.178C59.2372 539.206 14.0091 521.981 12.9329 530.001L1.02722 528.284L0 0Z"
                    transform="translate(7.629395E-06 6.103516E-05)"
                    fill="currentColor"
                    stroke="none"
                  ></path>
                </g>
              </svg>
            </div>
          </div>

          <div class="p-6">
            <p class="text-sm">{{ item.date }}</p>

            <h4 class="text-lg hover:text-blue-700 font-semibold my-2">
              <a [routerLink]="[]">{{ item.title }}</a>
            </h4>

            <p class="text-default-400 my-2">
              {{ item.description }}
              <a [routerLink]="[]" class="text-default-800 hover:text-blue-700"> Read More </a>
            </p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
