<!-- testimonial Section Start -->
<section class="py-16 lg:py-32 overflow-x-hidden">
    <div class="container" data-aos="fade-up" data-aos-duration="600">
        <div class="grid xl:grid-cols-4 grid-cols-3 gap-10">

            <div class="col-span-3 lg:col-span-1">
                <span class="text-sm font-medium py-1 px-3 rounded-full text-primary bg-primary/10">Feedback</span>
                <h1 class="text-3xl/tight font-medium mt-3 mb-4">What people say</h1>
                <p class="text-default-500">Some valuables words from our customers.</p>

                <div class="flex gap-5 mt-10">
                    <div class="button-prev text-xl transition-all duration-300 hover:text-primary"><iconify-icon icon="fa6-solid:arrow-left"></iconify-icon></div>
                    <div class="button-next text-xl transition-all duration-300 hover:text-primary"><iconify-icon icon="fa6-solid:arrow-right"></iconify-icon></div>
                </div>
            </div>

            <div class="col-span-3 lg:col-span-2 xl:col-span-3">
                <div class="relative">

                    <div class="hidden sm:block">
                        <div class="before:w-24 before:h-24 before:absolute before:-top-8 before:-end-8 before:bg-[url('assets/images/pattern/dot5.svg')]">
                        </div>
                        <div class="after:w-24 after:h-24 after:absolute after:-bottom-8 after:-start-8 after:bg-[url('assets/images/pattern/dot2.svg')]">
                        </div>
                    </div>

                    <div id="swiper_one" class="swiper relative">
                        <swiper-container class="swiper-wrapper z-10" [config]="swiperConfig" init="false">
                            @for (item of testimonialData; track $index) {
                            <swiper-slide class="p-10 border border-default-200 rounded-xl bg-white shadow">
                                <iconify-icon icon="fa6-solid:quote-left" class="text-default-500 text-5xl"></iconify-icon>
                                <p class="my-4"> {{ item.text }}</p>
                                <div class="border-b border-default-200 w-full my-7"></div>
                                <div class="flex flex-wrap items-center justify-between gap-10">
                                    <div class="flex items-center gap-2">
                                        <img [src]="item.avatar" class="h-10 w-10 rounded-full">
                                        <div>
                                            <h1 class="text-sm mb-1">{{ item.name }}</h1>
                                            <p class="text-default-500 text-xs">{{ item.role }}</p>
                                        </div>
                                    </div>
                                    <div>
                                        <img [src]="item.brand" class="w-24">
                                    </div>
                                </div>
                            </swiper-slide>
                            }

                        </swiper-container>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
<!-- testimonial Section end -->
