<section class="lg:pb-20 py-16">
    <div class="container">

        <div class="text-center">
            <span class="text-sm bg-primary/10 text-primary rounded-full px-3 py-1">Investor</span>
            <h1 class="text-3xl/tight font-medium mt-3 mb-4">We are backed by</h1>
            <p class="text-default-500">100+ clients trust<span class="text-primary"> Prompt </span>to drive
                perfomance & engagement.</p>
        </div>

        <div class="mt-14">
            <div class="grid md:grid-cols-4 grid-cols-2 gap-5 items-center" data-aos="fade-up">
                @for (brand of brandsData; track brand.name) {
                    <div>
                        <img [src]="brand.logo" [alt]="brand.name + '-logo'" class="w-32 mx-auto">
                    </div>
                }
            </div>
        </div>

    </div>
</section>
