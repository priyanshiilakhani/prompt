<section class="bg-gradient-to-r from-default-200/50 to-default-100/50 relative lg:py-24 py-16">
  <div class="absolute top-0 inset-x-0 hidden sm:block">
    <img
      src="assets/images/shapes/white-wave.svg"
      alt="white-wave-svg"
      class="w-full -scale-x-100"
    />
  </div>

  <div class="py-10">
    <div class="container" data-aos="fade-up">
      <div class="text-center">
        <span class="text-sm bg-primary/10 text-primary rounded-full px-3 py-1">Stats</span>
        <h1 class="text-3xl/tight font-medium mt-3">Prompt In Numbers</h1>
      </div>

      <div class="mt-14">
        <div class="grid xl:grid-cols-4 sm:grid-cols-2 text-center gap-10 lg:gap-6">
          @for (stat of statsData; track stat.title) {
            <div>
              <span class="text-3xl">{{ stat.value }}</span>
              <h1 class="mt-3 mb-1">{{ stat.title }}</h1>
              <p class="text-default-500">{{ stat.description }}</p>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</section>
