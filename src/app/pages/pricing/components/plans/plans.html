<section class="py-20">
  <div class="container">
    <div class="text-center max-w-2xl mx-auto">
      <span class="text-sm font-medium py-1 px-3 rounded-full text-primary bg-primary/10"
        >Plans</span
      >
      <h2 class="md:text-3xl/tight text-3xl font-semibold my-4">Pricing Plans</h2>
      <p class="md:text-lg text-default-500 leading-7">
        Pricing that <span class="text-primary">works</span> for everyone.
      </p>
    </div>

    <div class="grid xl:grid-cols-3 lg:grid-cols-2 grid-cols-1 gap-6 items-center mt-16">
      @for (plan of pricingData; track $index) {
        <div>
          <div
            class="border border-default-200 p-6 rounded hover:shadow-lg"
              [class.text-center]="$index === 0"
               [class.relative]="plan.isPopular"
          >
            <!-- Popular Badge -->
            @if (plan.isPopular) {
              <div class="absolute w-full h-[188px] -z-10 top-0 left-0 overflow-hidden">
                <span
                  class="absolute transform rotate-45 bg-primary text-center text-white font-medium py-1 right-[-52px] top-[23px] w-[170px] h-5 z-[2] text-xs overflow-hidden border border-dashed leading-[8px] border-white shadow-[0_0_0_3px] shadow-primary/40"
                >
                  Popular
                </span>
              </div>
            }

            <!-- Title -->
            <h4 class="text-lg text-primary text-center">{{ plan.name }}</h4>

            <!-- Price -->
            <h1 class="mt-3 mb-8 text-center">
              <sup class="align-super text-sm text-default-500">$</sup>
              <span class="text-3xl font-semibold">{{ plan.price }}</span>
              <sub class="text-sm text-default-500">{{ plan.duration }}</sub>
            </h1>

            <hr />

            <!-- Features -->
            <div class="grid gap-y-4 mt-8">
              @for (feature of plan.features; track $index) {
                <div class="flex items-center gap-2">
                  <iconify-icon
                    icon="tabler:check"
                    width="20"
                    height="20"
                    class="text-green-500"
                  ></iconify-icon>
                  <span>{{ feature }}</span>
                </div>
              }
            </div>

            <!-- Button -->
            <div [ngClass]="$index === 0 ? 'mt-24' : 'mt-14'">
              <a
                [routerLink]="[]"
                class="py-3 px-6 flex items-center justify-center rounded hover:border hover:border-primary/50 text-primary bg-primary/10 transition-all duration-500"
              >
                Sign Up Now
              </a>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
