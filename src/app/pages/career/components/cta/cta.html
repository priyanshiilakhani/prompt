<section class="lg:py-24 py-16">
  <div class="container">
    <div class="grid md:grid-cols-2 gap-10">
      @for (item of infoData; track $index) {
        <div>
          <div class="border border-default-200 rounded-md p-8">
            <h1 class="text-xl mb-3">{{ item.title }}</h1>

            <p class="text-default-500">
              {{ item.description }}
            </p>

            <button class="mt-10 flex items-center">
              <a
                [routerLink]="[]"
                class="border border-primary text-primary rounded-md hover:bg-primary hover:text-white hover:shadow-lg hover:shadow-primary/30 transition-all duration-500 focus:shadow-none focus:outline focus:outline-primary/40 py-2 px-4"
              >
                {{ item.buttonText }}
              </a>
            </button>
          </div>
        </div>
      }
    </div>
  </div>
</section>
