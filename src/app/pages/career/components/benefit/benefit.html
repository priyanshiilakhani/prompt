<section class="lg:py-24 py-16">
  <div class="container">
    <div class="text-center">
      <span class="text-sm font-medium py-1 px-3 rounded-full text-primary bg-primary/10"
        >Benefits</span
      >
      <h1 class="text-3xl/tight font-medium mt-3 mb-4">We take care of our team</h1>
      <p class="text-default-500">Few benefits from working together</p>
    </div>

    <div class="mt-14">
      <div class="grid md:grid-cols-2 gap-14 items-center">
        @for (item of featureData; track $index) {
          <div>
            <div
              class="flex gap-6 items-center"
              data-aos="fade-up"
              [attr.data-aos-duration]="item.duration"
            >
              <div>
                <span class="h-16 w-16 bg-primary/10 rounded-md flex items-center justify-center">
                  <iconify-icon [icon]="item.icon" width="32" height="32" class="text-primary"> </iconify-icon>
                </span>
              </div>

              <div>
                <h6 class="mb-2 font-medium">{{ item.title }}</h6>
                <p class="text-default-500">{{ item.description }}</p>
              </div>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
