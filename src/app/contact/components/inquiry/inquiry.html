<section class="lg:pb-24 py-6 relative">
  <div class="container">
    <div class="lg:flex align-items-center">
      <div class="lg:w-1/2">
        <div class="mb-6 relative bg-clip-border rounded-[0.1875rem]">
          <div class="py-12">
            <h2 class="mb-4 text-2xl/6 mt-0 font-medium">Let's Talk Further</h2>
            <p class="mb-12 text-base/6">
              Please fill out the following form and we will get back to you shortly
            </p>

            <form>
              <div class="flex gap-6">
                <div class="md:w-1/2">
                  <div class="mb-5">
                    <label
                      for="exampleInputName1"
                      class="block text-sm font-medium mb-1 text-default-600"
                      >Name <span class="text-red-500">*</span></label
                    >
                    <input
                      type="text"
                      class="py-2 px-4 leading-6 block w-full border-default-300 rounded text-sm focus:border-default-300 focus:ring-0"
                      id="exampleInputName1"
                      placeholder="Your Name"
                    />
                  </div>
                </div>
                <div class="md:w-1/2">
                  <div class="mb-5">
                    <label
                      for="exampleInputName"
                      class="block text-sm font-medium mb-1 text-default-600"
                      >Name <span class="text-red-500">*</span></label
                    >
                    <input
                      type="text"
                      class="py-2 px-4 leading-6 block w-full border-default-300 rounded text-sm focus:border-default-300 focus:ring-0"
                      id="exampleInputName"
                      placeholder="Your Name"
                    />
                  </div>
                </div>
              </div>
              <div class="w-full">
                <div class="mb-5">
                  <label
                    for="exampleInputEmail1"
                    class="block text-sm font-medium mb-1 text-default-600"
                    >Email <span class="text-red-500">*</span></label
                  >
                  <input
                    type="email"
                    class="py-2 px-4 leading-6 block w-full border-default-300 rounded text-sm focus:border-default-300 focus:ring-0"
                    id="exampleInputEmail1"
                    placeholder="Your Email"
                  />
                </div>
                <div class="mb-5">
                  <label
                    for="exampleFormControlTextarea1"
                    class="block text-sm font-medium mb-1 text-default-600"
                    >Message <span class="text-red-500">*</span></label
                  >
                  <textarea
                    class="py-2 px-4 leading-6 block w-full border-default-300 rounded text-sm focus:border-default-300 focus:ring-0"
                    id="exampleFormControlTextarea1"
                    rows="4"
                    placeholder="Type Your Massage..."
                  ></textarea>
                </div>
              </div>
              <button
                type="submit"
                class="inline-flex items-center text-sm bg-primary text-white font-medium leading-6 text-center align-middle select-none py-2 px-4 rounded-md transition-all hover:shadow-lg hover:shadow-primary/80"
              >
                Send
                <iconify-icon
                  icon="tabler:send-2"
                  width="16"
                  height="16"
                  class="ms-1"
                ></iconify-icon>
              </button>
            </form>
          </div>
        </div>
      </div>

      <div class="lg:w-5/12 ms-auto overflow-x-hidden">
        <div class="h-[520px]">
          <div
            id="marker-map5"
            class="h-100"
            data-toggle="map"
            data-map='{"mapCenter": [40.749179, -73.989276], "zoom": 12, "useTextIcon": false, "interactive": true, "geojson": "/assets/sample-listing-geojson.json" }'
          >
            <iframe
              class="w-full h-[500px]"
              src="https://www.google.com/maps/embed?pb=!1m10!1m8!1m3!1d6030.418742494061!2d-111.34563870463673!3d26.01036670629853!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses-419!2smx!4v1471908546569"
              frameborder="0"
            ></iframe>
          </div>
        </div>
      </div>
    </div>

    <div class="grid md:grid-cols-3 gap-6">
      @for (item of contactData; track $index) {
        <div class="flex gap-4 mb-3">
          <span
            class="flex items-center justify-center size-12 rounded-lg relative shrink-0"
            [ngClass]="item.bgClass"
          >
            <iconify-icon [icon]="item.icon" width="28" height="28" [ngClass]="item.textColor">
            </iconify-icon>
          </span>

          <div class="grow">
            <h5 class="text-base text-default-700">{{ item.title }}</h5>

            <a [routerLink]="[]" class="text-default-500 my-1">
              {{ item.value }}
            </a>
          </div>
        </div>
      }
    </div>
  </div>
</section>
